plugins:
  - rubocop-minitest

require:
  - rubocop/cop/custom

AllCops:
  CacheRootDirectory: "vendor"
  NewCops: enable
  SuggestExtensions: false

Gemspec/RequiredRubyVersion:
  Enabled: false

Naming/MemoizedInstanceVariableName:
  Enabled: false

Style/MapToHash:
  Enabled: false

Style/OneClassPerFile:
  Enabled: false

Style/RedundantParentheses:
  Enabled: false

Custom/IpRanges:
  Enabled: true
