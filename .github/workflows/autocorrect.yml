name: Autocorrect

on:
  schedule:
    - cron: "29 6 * * 6"

  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # 6.0.2
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@6aaa311d81eba98ae12eaffbcb63296ace0efcde # 1.307.0
        with:
          bundler-cache: true
      - name: Run tests
        run: bundle exec rake test
      - name: Run linter
        run: bundle exec rubocop -A
        continue-on-error: true
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # 8.1.1
        with:
          branch: update/lint-autocorrect
          delete-branch: true
          commit-message: "🔧 autocorrect by Rubocop"
          title: "[rubocop] Automatic corrections"
          body: |
            Please review automatic changes proposed by `rubocop -a`.
